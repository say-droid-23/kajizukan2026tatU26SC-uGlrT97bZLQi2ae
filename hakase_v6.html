<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>さゆはかせのページ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap');
:root{
  --yellow:#f7c948;--darkbg:#0f0f1a;--lightblue:#88ccff;--red:#cc2222;
  --green:#22aa44;--lightgreen:#aaffcc;
  --pixel:'DotGothic16',monospace;--round:'M PLUS Rounded 1c',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--darkbg);font-family:var(--round);min-height:100vh;padding:20px;display:flex;flex-direction:column;align-items:center;gap:16px;}

.card{background:#111;border:2px solid #333;border-radius:12px;padding:24px 20px;width:100%;max-width:380px;}
.card-title{font-family:var(--pixel);font-size:.75rem;color:var(--yellow);letter-spacing:3px;margin-bottom:16px;}

/* QR */
.qr-card{background:#000;border:3px solid #444;border-radius:10px;padding:20px;text-align:center;}
.qr-label{font-family:var(--pixel);font-size:.55rem;color:#555;letter-spacing:2px;margin-bottom:12px;}
.qr-wrap{background:white;border-radius:8px;padding:12px;display:inline-block;margin-bottom:12px;}
.qr-placeholder{width:160px;height:160px;background:#1a1a1a;border-radius:4px;display:flex;align-items:center;justify-content:center;}
.qr-placeholder-text{font-family:var(--pixel);font-size:.6rem;color:#333;letter-spacing:1px;text-align:center;line-height:2;}
.qr-status{font-family:var(--pixel);font-size:.65rem;letter-spacing:2px;min-height:20px;margin-bottom:6px;}
.qr-status.active{color:var(--lightgreen);}
.qr-status.warning{color:var(--yellow);}
.qr-status.expired{color:#ff6666;}

/* タイマー */
.timer-bar-wrap{background:#1a1a1a;border-radius:3px;height:8px;border:1px solid #333;overflow:hidden;margin-bottom:4px;}
.timer-bar{height:100%;background:linear-gradient(90deg,var(--green),var(--lightgreen));width:100%;transition:width .5s linear,background .5s;}
.timer-bar.warning{background:linear-gradient(90deg,#f7c948,#ffdd88);}
.timer-bar.expired{background:#ff4444;width:0%;}
.timer-text{font-family:var(--pixel);font-size:.6rem;color:#555;letter-spacing:2px;text-align:right;}

.gen-btn{background:var(--yellow);color:#111;border:none;border-radius:6px;padding:14px;font-family:var(--pixel);font-size:.82rem;letter-spacing:2px;cursor:pointer;box-shadow:0 4px 0 #a07a00;transition:transform .1s,box-shadow .1s;width:100%;margin-top:12px;}
.gen-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #a07a00;}
.gen-btn.danger{background:#cc2222;color:white;box-shadow:0 4px 0 #7a0000;}
.gen-btn.danger:active{box-shadow:0 1px 0 #7a0000;}

/* STATUS */
.status-row{display:flex;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid #1a1a1a;}
.status-row:last-child{border-bottom:none;}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-on{background:var(--lightgreen);box-shadow:0 0 6px var(--lightgreen);}
.dot-off{background:#333;}
.dot-warn{background:var(--yellow);box-shadow:0 0 6px var(--yellow);}
.status-text{font-family:var(--pixel);font-size:.62rem;color:#666;letter-spacing:1px;flex:1;}
.status-val{font-family:var(--pixel);font-size:.62rem;letter-spacing:1px;}
.val-ok{color:var(--lightgreen);}
.val-ng{color:#ff6666;}
.val-warn{color:var(--yellow);}
.val-gray{color:#333;}

/* history */
.history-item{font-family:var(--pixel);font-size:.58rem;color:#444;padding:5px 0;border-bottom:1px solid #1a1a1a;display:flex;gap:8px;align-items:center;}
.history-item:last-child{border-bottom:none;}
.h-time{color:#333;min-width:44px;}
.h-status{margin-left:auto;font-size:.55rem;}

.demo-btn{flex:1;background:#0d1a2e;border:2px solid #2a3a5a;color:#7ab8e8;font-family:'DotGothic16',monospace;font-size:.62rem;padding:8px 4px;border-radius:6px;cursor:pointer;letter-spacing:1px;transition:border-color .15s,background .15s;}
.demo-btn:active,.demo-btn.selected{background:#1a3a6b;border-color:#7ab8e8;}
</style>
</head>
<body>

<!-- QRカード -->
<div class="card">
  <div class="card-title">🔬 かいじょQRせいせい</div>
  <div class="qr-card">
    <div class="qr-label">▶ このQRをあいてにみせるのじゃ（1ぷんゆうこう）</div>
    <div class="qr-wrap">
      <div id="qrContainer">
        <div class="qr-placeholder">
          <div class="qr-placeholder-text">ボタンをおして<br>QRをせいせい<br>するのじゃ</div>
        </div>
      </div>
    </div>
    <div class="qr-status" id="qrStatus"></div>
    <div class="timer-bar-wrap" id="timerBarWrap" style="display:none;">
      <div class="timer-bar" id="timerBar"></div>
    </div>
    <div class="timer-text" id="timerText"></div>
  </div>
  <button class="gen-btn" onclick="generateQR()">🎲 あたらしいかいじょQRをせいせい</button>
</div>

<!-- デモバトルQR -->
<div class="card">
  <div class="card-title">⚔️ デモバトルQR</div>
  <div style="font-family:'DotGothic16',monospace;font-size:.62rem;color:#666;letter-spacing:1px;margin-bottom:12px;line-height:1.8;">
    あいてが　えらんだポケモンを　えらぶのじゃ。<br>
    プレイヤーが　ゆうりな　あいてを　だすのじゃ！
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px;">
    <button onclick="genDemoQR('chikorita')" class="demo-btn" id="demoBtnChikorita">🌿 チコリータ</button>
    <button onclick="genDemoQR('cyndaquil')" class="demo-btn" id="demoBtnCyndaquil">🔥 ヒノアラシ</button>
    <button onclick="genDemoQR('totodile')" class="demo-btn" id="demoBtnTotodile">💧 ワニノコ</button>
  </div>
  <div class="qr-card" id="demoQrCard" style="display:none;">
    <div class="qr-label" id="demoQrLabel">▶ このQRをあいてにみせるのじゃ（1ぷんゆうこう）</div>
    <div class="qr-wrap"><div id="demoQrContainer"></div></div>
    <div class="qr-status" id="demoQrStatus"></div>
    <div class="timer-bar-wrap" id="demoTimerBarWrap">
      <div class="timer-bar" id="demoTimerBar"></div>
    </div>
    <div class="timer-text" id="demoTimerText"></div>
  </div>
  <br>
  <div id="readySection" style="display:none;">
    <div style="font-family:'DotGothic16',monospace;font-size:.62rem;color:#7ab8e8;letter-spacing:1px;margin-bottom:10px;line-height:1.8;text-align:center;">
      せつめいが　おわったら<br>ボタンをおすのじゃ！
    </div>
    <button class="gen-btn" onclick="sendReady()" style="background:linear-gradient(135deg,#22aa44,#44cc66);border-color:#aaffcc;">
      ✅ せつめいおわり！ずかんをひらく
    </button>
    <div id="readyStatus" style="font-family:'DotGothic16',monospace;font-size:.6rem;color:#555;letter-spacing:1px;margin-top:8px;text-align:center;min-height:16px;"></div>
  </div>
</div>

<!-- 強制解除ボタン -->
<div class="card">
  <div class="card-title">🔓 きょうせいかいじょ</div>
  <div style="font-family:'DotGothic16',monospace;font-size:.6rem;color:#555;letter-spacing:1px;margin-bottom:12px;line-height:1.8;">ひつようなときだけつかうのじゃ</div>
  <button class="gen-btn danger" onclick="clearPenalty()">ペナルティをきょうせいかいじょ</button>
</div>

<!-- 履歴 -->
<div class="card">
  <div class="card-title">📋 かいじょりれき</div>
  <div id="historyList">
    <div style="font-family:'DotGothic16',monospace;font-size:.6rem;color:#333;">なし</div>
  </div>
</div>

<script>
const ZUKAN_FILE = 'kajizukan_v9.html';
const EXPIRE_MS = 60000; // 1分

let currentCode = null;
let currentTs = null;
let timerInterval = null;
let history = JSON.parse(localStorage.getItem('kaji_unlock_history') || '[]');

// デモバトルポケモンマップ（プレイヤーが選んだ→相手に出すポケモン）
const demoOpponentMap = {
  'chikorita': {id:'starter_totodile',   name:'ワニノコ',   icon:'💧'},
  'cyndaquil': {id:'starter_chikorita',  name:'チコリータ', icon:'🌿'},
  'totodile':  {id:'starter_cyndaquil',  name:'ヒノアラシ', icon:'🔥'},
};

let demoTimerInterval = null;
let currentDemoCode = null;
let currentDemoTs = null;

function genDemoQR(playerStarter){
  // ボタンハイライト
  ['chikorita','cyndaquil','totodile'].forEach(id=>{
    document.getElementById('demoBtnChikorita').classList.remove('selected');
    document.getElementById('demoBtnCyndaquil').classList.remove('selected');
    document.getElementById('demoBtnTotodile').classList.remove('selected');
  });
  document.getElementById('demoBtn'+playerStarter.charAt(0).toUpperCase()+playerStarter.slice(1)).classList.add('selected');

  const opponent = demoOpponentMap[playerStarter];
  if(!opponent) return;

  // タイマークリア
  if(demoTimerInterval) clearInterval(demoTimerInterval);

  // コードとタイムスタンプ生成
  currentDemoCode = Math.random().toString(36).substring(2,10).toUpperCase();
  currentDemoTs = Date.now();

  const url = ZUKAN_FILE + '?id=' + opponent.id + '&demo=1&unlock=' + currentDemoCode + '&ts=' + currentDemoTs;

  // QR生成
  const container = document.getElementById('demoQrContainer');
  container.innerHTML = '';
  new QRCode(container, {
    text: url,
    width: 160,
    height: 160,
    colorDark: '#000000',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });

  document.getElementById('demoQrCard').style.display='block';
  document.getElementById('readySection').style.display='block';
  document.getElementById('demoQrLabel').textContent =
    '▶ ' + opponent.icon + opponent.name + 'との　デモバトルQRじゃ（1ぷんゆうこう）';
  document.getElementById('demoTimerBarWrap').style.display='block';

  startDemoTimer();
}

function sendReady(){
  // デモバトルで出したポケモンをcaughtに追加
  const demoOpponentIds = {
    'chikorita': 'starter_totodile',
    'cyndaquil': 'starter_chikorita',
    'totodile':  'starter_cyndaquil',
  };
  const savedStarter = JSON.parse(localStorage.getItem('kaji_starter')||'null');
  if(savedStarter && savedStarter.id){
    const opponentId = demoOpponentIds[savedStarter.id];
    if(opponentId){
      let caught = JSON.parse(localStorage.getItem('kaji_caught2')||'[]');
      if(!caught.includes(opponentId)){
        caught.push(opponentId);
        localStorage.setItem('kaji_caught2', JSON.stringify(caught));
      }
    }
  }
  // 同じ端末ならlocalStorageで通知
  localStorage.setItem('kaji_ready','1');
  document.getElementById('readyStatus').textContent='ずかんをひらいたのじゃ！';
  document.getElementById('readyStatus').style.color='#88ff88';
  // 5秒後にリセット
  setTimeout(()=>{
    localStorage.removeItem('kaji_ready');
    document.getElementById('readyStatus').textContent='';
  }, 5000);
}

function startDemoTimer(){
  if(demoTimerInterval) clearInterval(demoTimerInterval);
  demoTimerInterval = setInterval(()=>{
    const elapsed = Date.now() - currentDemoTs;
    const remaining = EXPIRE_MS - elapsed;
    const pct = Math.max(0, remaining / EXPIRE_MS * 100);
    const secs = Math.max(0, Math.ceil(remaining / 1000));

    const bar = document.getElementById('demoTimerBar');
    const status = document.getElementById('demoQrStatus');
    const timerText = document.getElementById('demoTimerText');

    if(remaining <= 0){
      bar.style.width='0%';
      bar.className='timer-bar expired';
      status.className='qr-status expired';
      status.textContent='きれんしたのじゃ！あたらしくせいせいするのじゃ';
      timerText.textContent='';
      clearInterval(demoTimerInterval);
    } else {
      bar.style.width=pct+'%';
      if(secs<=20){
        bar.className='timer-bar warning';
        status.className='qr-status warning';
        status.textContent='もうすぐきれるのじゃ！はやくみせるのじゃ！';
      } else {
        bar.className='timer-bar';
        status.className='qr-status active';
        status.textContent='ゆうこう：よみとりまち';
      }
      timerText.textContent=secs+'びょう';
    }
  }, 500);
}

function generateQR(){
  // タイマーをクリア
  if(timerInterval) clearInterval(timerInterval);

  // コードとタイムスタンプ生成
  currentCode = Math.random().toString(36).substring(2,10).toUpperCase();
  currentTs = Date.now();

  // URL生成
  const url = `${ZUKAN_FILE}?unlock=${currentCode}&ts=${currentTs}`;

  // QR生成
  const container = document.getElementById('qrContainer');
  container.innerHTML = '';
  new QRCode(container, {
    text: url,
    width: 160,
    height: 160,
    colorDark: '#000000',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });

  // タイマーバー表示
  document.getElementById('timerBarWrap').style.display = 'block';

  // 履歴追加
  const now = new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  history.unshift({code:currentCode, time:now, ts:currentTs, used:false, expired:false});
  if(history.length > 10) history = history.slice(0,10);
  localStorage.setItem('kaji_unlock_history', JSON.stringify(history));

  // タイマー開始
  startTimer();
  renderStatus();
}

function startTimer(){
  if(timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    const elapsed = Date.now() - currentTs;
    const remaining = EXPIRE_MS - elapsed;
    const pct = Math.max(0, remaining / EXPIRE_MS * 100);
    const secs = Math.max(0, Math.ceil(remaining / 1000));

    const bar = document.getElementById('timerBar');
    const status = document.getElementById('qrStatus');
    const timerText = document.getElementById('timerText');

    if(remaining <= 0){
      bar.style.width = '0%';
      bar.className = 'timer-bar expired';
      status.className = 'qr-status expired';
      status.textContent = 'きれんしたのじゃ！あたらしくせいせいするのじゃ';
      timerText.textContent = '';
      clearInterval(timerInterval);
      // 履歴を期限切れに
      history = history.map(h => h.code===currentCode ? {...h, expired:true} : h);
      localStorage.setItem('kaji_unlock_history', JSON.stringify(history));
      renderHistory();
    } else {
      bar.style.width = pct + '%';
      if(secs <= 20){
        bar.className = 'timer-bar warning';
        status.className = 'qr-status warning';
        status.textContent = 'もうすぐきれるのじゃ！はやくみせるのじゃ！';
      } else {
        bar.className = 'timer-bar';
        status.className = 'qr-status active';
        status.textContent = 'ゆうこう：よみとりまち';
      }
      timerText.textContent = secs + 'びょう';
    }

    // 使用済みチェック
    const usedCodes = JSON.parse(localStorage.getItem('kaji_used_unlock') || '[]');
    if(usedCodes.includes(currentCode)){
      status.className = 'qr-status expired';
      status.textContent = 'つかわれたのじゃ！かいじょせいこう！';
      timerText.textContent = '';
      bar.style.width = '0%';
      clearInterval(timerInterval);
      history = history.map(h => h.code===currentCode ? {...h, used:true} : h);
      localStorage.setItem('kaji_unlock_history', JSON.stringify(history));
      renderHistory();
    }
  }, 500);
}

function clearPenalty(){
  if(!confirm('ペナルティをきょうせいかいじょしますか？'))return;
  localStorage.removeItem('kaji_penalty');
  localStorage.removeItem('kaji_penalty_ex');
  localStorage.removeItem('kaji_penalty_hint');
  localStorage.removeItem('kaji_penalty_entry');
  renderStatus();
}

function renderStatus(){
  renderHistory();
}

function renderHistory(){
  history = JSON.parse(localStorage.getItem('kaji_unlock_history') || '[]');
  const usedCodes = JSON.parse(localStorage.getItem('kaji_used_unlock') || '[]');
  const listEl = document.getElementById('historyList');
  if(history.length === 0){
    listEl.innerHTML = '<div style="font-family:\'DotGothic16\',monospace;font-size:.6rem;color:#333;">なし</div>';
    return;
  }
  listEl.innerHTML = history.map(h => {
    const isUsed = usedCodes.includes(h.code);
    const isExpired = h.expired && !isUsed;
    let statusText, statusColor;
    if(isUsed){ statusText='かいじょずみ'; statusColor='#88cc88'; }
    else if(isExpired){ statusText='きれん'; statusColor='#555'; }
    else { statusText='ゆうこう'; statusColor='#f7c948'; }
    return `<div class="history-item">
      <span class="h-time">${h.time}</span>
      <span style="font-family:'DotGothic16',monospace;font-size:.58rem;color:#555;letter-spacing:2px;">${h.code}</span>
      <span class="h-status" style="color:${statusColor};">${statusText}</span>
    </div>`;
  }).join('');
}

setInterval(renderStatus, 1000);
renderStatus();
</script>
</body>
</html>
