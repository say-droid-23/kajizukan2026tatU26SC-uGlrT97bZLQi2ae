@import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DotGothic16',monospace;background:#f0f0f0;padding:16px;}
h1{font-size:1rem;text-align:center;margin-bottom:12px;color:#333;}
.controls{text-align:center;margin-bottom:16px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.btn{background:#1a3a6b;color:white;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;font-size:.75rem;font-family:'DotGothic16',monospace;}
.btn:hover{background:#2a5298;}
.filter-btn{background:#555;}
.filter-btn.active{background:#1a3a6b;}
.room-section{margin-bottom:16px;}
.room-header{background:#1a3a6b;color:white;padding:6px 12px;border-radius:4px;font-size:.75rem;margin-bottom:8px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px;}
.qr-card{background:white;border:1px solid #ccc;border-radius:4px;padding:6px;text-align:center;}
.qr-card .num{font-size:.5rem;color:#999;}
.qr-card .place{font-size:.58rem;color:#333;margin:2px 0;font-weight:bold;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100px;display:block;}
.qr-card .room-label{font-size:.48rem;color:#888;}
@media print{
  body{padding:0;background:white;}
  .controls{display:none;}
  .room-header{background:#333!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .grid{grid-template-columns:repeat(5,1fr);gap:4px;}
  .qr-card{border:1px solid #aaa;padding:4px;}
  .room-section{page-break-inside:avoid;}
}
</style>

const roomNames = {
  'たびだちのひろば':'🚪 たびだちのひろば（げんかん）',
  'Sのしま':'🚽 Sのしま（トイレ）',
  'あわあわシティ':'🪥 あわあわシティ（洗面所）',
  'りょうりこうげん':'🍳 りょうりこうげん（キッチン）',
  'くつろぎシティ':'📺 くつろぎシティ（リビング）',
  'ねむりのもり':'🛏️ ねむりのもり（ベッドルーム）',
};

let currentRoom = 'all';

function filterRoom(room) {
  currentRoom = room;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  const id = room === 'all' ? 'btn-all' :
    room === 'たびだちのひろば' ? 'btn-r0' :
    room === 'Sのしま' ? 'btn-r1' :
    room === 'あわあわシティ' ? 'btn-r2' :
    room === 'りょうりこうげん' ? 'btn-r3' :
    room === 'くつろぎシティ' ? 'btn-r4' : 'btn-r5';
  document.getElementById(id).classList.add('active');
  render();
}

function render() {
  const container = document.getElementById('container');
  container.innerHTML = '';
  const rooms = currentRoom === 'all' ? roomOrder : [currentRoom];
  rooms.forEach(room => {
    let filtered = entries.filter(e => e.room === room);

    if(!filtered.length) return;
    const sec = document.createElement('div');
    sec.className = 'room-section';
    const header = document.createElement('div');
    header.className = 'room-header';
    header.textContent = roomNames[room] || room;
    sec.appendChild(header);
    const grid = document.createElement('div');
    grid.className = 'grid';
    filtered.forEach(e => {
      const card = document.createElement('div');
      card.className = 'qr-card';
      card.innerHTML = `<div class="num">No.${e.id}</div><span class="place">${e.place}</span>`;
      const qrDiv = document.createElement('div');
      card.appendChild(qrDiv);
      grid.appendChild(card);
      new QRCode(qrDiv, {
        text: BASE + '?id=' + e.id,
        width: 90, height: 90,
        colorDark: '#000', colorLight: '#fff',
        correctLevel: QRCode.CorrectLevel.M
      });
    });
    sec.appendChild(grid);
    container.appendChild(sec);
  });
}

render();
