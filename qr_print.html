*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DotGothic16',monospace;background:#f0f0f0;padding:16px;}
h1{font-size:.9rem;text-align:center;margin-bottom:12px;color:#333;}
.controls{text-align:center;margin-bottom:16px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.btn{background:#1a3a6b;color:white;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;font-family:'DotGothic16',monospace;font-size:.75rem;}
.btn.green{background:#1a6b3a;}
#printArea{background:white;padding:8px;}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;}
.qr-card{border:1px solid #ccc;border-radius:3px;padding:4px;text-align:center;background:white;}
.qr-card .no{font-size:.48rem;color:#999;}
.qr-card .area{font-size:.45rem;color:#888;}
.qr-card .place{font-size:.55rem;color:#333;font-weight:bold;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;}
.qr-card img{display:block;margin:2px auto;width:80px;height:80px;}
@media print{
  body{padding:0;background:white;}
  .controls{display:none;}
  .grid{grid-template-columns:repeat(5,1fr)!important;gap:3px!important;}
  .qr-card{border:1px solid #aaa!important;padding:3px!important;}
  -webkit-print-color-adjust:exact;
  print-color-adjust:exact;
}
</style>

function generateAll(){
  const btn = document.getElementById('genBtn');
  btn.textContent = '⏳ せいせいちゅう…';
  btn.disabled = true;

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  let done = 0;
  entries.forEach(e => {
    const card = document.createElement('div');
    card.className = 'qr-card';

    const no = document.createElement('div');
    no.className = 'no';
    no.textContent = 'No.' + e.id;

    const area = document.createElement('div');
    area.className = 'area';
    area.textContent = e.area;

    // canvas生成→img変換
    const tmp = document.createElement('div');
    tmp.style.display = 'none';
    document.body.appendChild(tmp);
    new QRCode(tmp, {
      text: BASE + '?id=' + e.id,
      width: 80, height: 80,
      colorDark: '#000000', colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });

    const pl = document.createElement('div');
    pl.className = 'place';
    pl.textContent = e.place;

    card.appendChild(no);
    card.appendChild(area);

    setTimeout(() => {
      const canvas = tmp.querySelector('canvas');
      const img = document.createElement('img');
      img.src = canvas ? canvas.toDataURL('image/png') : '';
      card.appendChild(img);
      card.appendChild(pl);
      document.body.removeChild(tmp);
      done++;
      if(done === entries.length){
        btn.textContent = '✅ せいせいかんりょう！';
        document.getElementById('printBtn').style.display = 'inline-block';
      }
    }, 0);

    grid.appendChild(card);
  });
}
