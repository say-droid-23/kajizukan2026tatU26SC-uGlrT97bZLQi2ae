<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>かじずかん QR印刷</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DotGothic16',monospace;background:#f0f0f0;padding:16px;}
h1{font-size:.9rem;text-align:center;margin-bottom:12px;color:#333;}
.controls{text-align:center;margin-bottom:16px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.btn{background:#1a3a6b;color:white;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;font-family:'DotGothic16',monospace;font-size:.75rem;}
.btn:hover{background:#2a5298;}
.btn.green{background:#1a6b3a;}
.btn.green:hover{background:#2a9a4a;}
#printArea{background:white;padding:8px;}
.room-header{background:#1a3a6b;color:white;padding:6px 10px;font-size:.7rem;margin:8px 0 4px;border-radius:3px;}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:4px;}
.qr-card{border:1px solid #ccc;border-radius:3px;padding:5px;text-align:center;background:white;}
.qr-card .no{font-size:.48rem;color:#999;}
.qr-card .area{font-size:.45rem;color:#888;margin:1px 0;}
.qr-card .place{font-size:.55rem;color:#333;font-weight:bold;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.qr-card img{display:block;margin:3px auto;width:80px;height:80px;}
@media print{
  body{padding:0;background:white;}
  .controls{display:none;}
  .room-header{background:#333!important;color:white!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .grid{grid-template-columns:repeat(5,1fr)!important;}
  .qr-card{border:1px solid #aaa!important;}
}
</style>
</head>
<body>

</div>
<div id="printArea"></div>

function generateAll(){
  document.getElementById('genBtn').textContent = '⏳ せいせいちゅう…';
  document.getElementById('genBtn').disabled = true;

  const area = document.getElementById('printArea');
  area.innerHTML = '';

  // まずcanvasでQR生成
  const canvases = {};
  let total = 0;
  rooms.forEach(r => total += r.entries.length);

  let done = 0;
  rooms.forEach(room => {
    const sec = document.createElement('div');
    const header = document.createElement('div');
    header.className = 'room-header';
    header.textContent = room.name;
    sec.appendChild(header);
    const grid = document.createElement('div');
    grid.className = 'grid';
    room.entries.forEach(e => {
      const card = document.createElement('div');
      card.className = 'qr-card';
      const no = document.createElement('div');
      no.className = 'no';
      no.textContent = 'No.' + e.id;
      const ar = document.createElement('div');
      ar.className = 'area';
      ar.textContent = room.area;
      const pl = document.createElement('div');
      pl.className = 'place';
      pl.textContent = e.place;
      card.appendChild(no);
      card.appendChild(ar);
      // canvas生成してすぐimgに変換
      const tmp = document.createElement('div');
      tmp.style.display = 'none';
      document.body.appendChild(tmp);
      new QRCode(tmp, {
        text: BASE + '?id=' + e.id,
        width: 80, height: 80,
        colorDark: '#000000', colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
      setTimeout(() => {
        const canvas = tmp.querySelector('canvas');
        const img = document.createElement('img');
        img.src = canvas ? canvas.toDataURL('image/png') : '';
        img.width = 80; img.height = 80;
        card.appendChild(img);
        card.appendChild(pl);
        document.body.removeChild(tmp);
        done++;
        if(done === total){
          document.getElementById('genBtn').textContent = '✅ せいせいかんりょう';
          document.getElementById('printBtn').style.display = 'inline-block';
        }
      }, 0);
      grid.appendChild(card);
    });
    sec.appendChild(grid);
    area.appendChild(sec);
  });
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
